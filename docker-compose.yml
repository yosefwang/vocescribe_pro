# =============================================================================
# Vocescribe — Docker Compose
# Production deployment: single web app + Neon DB (external)
# =============================================================================
#
# Usage:
#   1. Copy .env.example to .env and fill in all values
#   2. docker compose up -d
#   3. App available at http://localhost:3000
#
# Environment variables are loaded from the .env file automatically.
# To override specific vars, add them under the 'environment:' section below.
# =============================================================================

services:
  web:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
